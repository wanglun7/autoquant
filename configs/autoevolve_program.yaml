name: autoevolve_v1
data_dir: data/raw
processed_dir: data/processed/autoevolve
results_dir: results/autoevolve
family_scopes:
  - cross_sectional
  - btc_time_series
  - relative_value
batch_size: 6
random_seed: 7
bar_hours: 4
costs:
  fee_bps: 4.0
  slippage_bps: 2.0
split:
  train_frac: 0.5
  validation_frac: 0.25
  test_frac: 0.25
constraints:
  max_drawdown_limit: 0.6
  min_test_net_return: 0.0
  min_test_sharpe: -0.25
  complexity_penalty: 0.01
search:
  cross_sectional_lookbacks: [60, 120, 180]
  cross_sectional_top_n: [30, 50, 80]
  cross_sectional_rebalance: ["4h", "1d", "1w"]
  btc_ts_models: ["momentum", "breakout", "mean_reversion", "vol_trend"]
  btc_ts_lookbacks: [20, 60, 120]
  pair_pool_size: 8
  pair_lookbacks: [20, 60, 120]
  funding_caps: [null, 0.0005, 0.001]
  regime_filters: [null, "btc_positive_trend"]
  vol_caps: [null, 0.05, 0.08]
